<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Palette Generator</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <!-- Container-->
  <body>
    <div class="container">
      <h1>Color Palette Generator</h1>
      <button id="generate-btn">
        <i class="fas fa-sync-alt"></i>
        Generate Palette
      </button>

      <div class="palette-container">
        <!-- COLOR BOX 1 -->
        <div class="color-box">
          <div class="color" style="background-color: #e1f5fe"></div>
          <div class="color-info">
            <span class="hex-value">#E1F5FE</span>
            <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
          </div>
        </div>
        <!-- COLOR BOX 2 -->
        <div class="color-box">
          <div class="color" style="background-color: #e1feef"></div>
          <div class="color-info">
            <span class="hex-value">#E1FEEF</span>
            <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
          </div>
        </div>
        <!-- COLOR BOX 3 -->
        <div class="color-box">
          <div class="color" style="background-color: #fde1fe"></div>
          <div class="color-info">
            <span class="hex-value">#FDE1FE</span>
            <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
          </div>
        </div>
        <!-- COLOR BOX 4 -->
        <div class="color-box">
          <div class="color" style="background-color: #e8fee1"></div>
          <div class="color-info">
            <span class="hex-value">#E8FEE1</span>
            <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
          </div>
        </div>
        <!-- COLOR BOX 5 -->
        <div class="color-box">
          <div class="color" style="background-color: #fee7e1"></div>
          <div class="color-info">
            <span class="hex-value">#FEE7E1</span>
            <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
